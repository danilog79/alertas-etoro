name: Alertas eToro PRO

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:
    inputs:
      trigger_source:
        description: "Origen del disparo"
        required: false
        default: "manual"
      reason:
        description: "Motivo de la ejecución"
        required: false
        default: "manual_run"

jobs:
  run-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements_alert_system_pro.txt

      - name: Crear config.json
        run: |
          cat > config.json << 'EOF'
          {
            "scan_interval_seconds": 300,
            "cooldown_minutes": 60,
            "min_confidence": 70,
            "risk_reward_min": 2.0,
            "top_candidates_in_heartbeat": 5,
            "telegram": {
              "enabled": true,
              "bot_token": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
              "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}"
            },
            "heartbeat": {
              "enabled": true,
              "interval_minutes": 60
            },
            "sources": {
              "fmp_enabled": false,
              "fmp_api_key": "${{ secrets.FMP_API_KEY }}",
              "fred_enabled": false,
              "fred_api_key": "${{ secrets.FRED_API_KEY }}",
              "etoro_enabled": false,
              "etoro_base_url": "https://api.etoro.com",
              "etoro_api_key": "${{ secrets.ETORO_API_KEY }}",
              "etoro_user_key": "${{ secrets.ETORO_USER_KEY }}"
            }
          }
          EOF

      - name: Ejecutar scanner
        run: python alert_system_pro.py --once

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alertas-etoro-pro-artifacts
          path: |
            signals_log.csv
            last_run_summary.json
          if-no-files-found: ignore
