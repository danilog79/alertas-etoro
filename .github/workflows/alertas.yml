name: Alertas eToro

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:
      inputs:
      trigger_source:
        description: "Origen del disparo"
        required: false
        default: "manual"
      reason:
        description: "Motivo de la ejecución"
        required: false
        default: "manual_run"

jobs:
  run-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements_alert_system.txt

      - name: Crear config.json
        run: |
          cat > config.json << 'EOF'
          {
            "scan_interval_seconds": 300,
            "cooldown_minutes": 60,
            "min_confidence": 70,
            "risk_reward_min": 2.0,
            "telegram": {
              "enabled": true,
              "bot_token": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
              "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}"
            },
            "heartbeat": {
              "enabled": true,
              "interval_minutes": 60,
              "send_only_when_no_signals": false
            },
            "intraday_filter": {
              "enabled": true,
              "min_atr_pct": 0.35,
              "max_distance_from_ema20_pct": 1.2,
              "max_distance_from_vwap_pct": 1.0,
              "max_trigger_candle_atr_multiple": 0.8,
              "us_session": {"start_utc": "13:35", "end_utc": "20:00"},
              "forex_session": {"start_utc": "06:00", "end_utc": "20:00"},
              "crypto_session": {"start_utc": "00:00", "end_utc": "23:59"}
            },
            "etoro_featured": {
              "enabled": true,
              "winners": ["GLD", "ARKK", "VXUS", "USDJPY=X"],
              "losers": ["LINK-USD", "ETH-USD", "ADA-USD", "SOL-USD", "XLE"],
              "score_boost": 10
            },
            "watchlists": {
              "intraday": [
                "SPY", "QQQ", "DIA", "IWM", "VTI", "GLD", "SLV", "ARKK", "VXUS", "XLE", "XLF", "XLK",
                "AAPL", "MSFT", "NVDA", "TSLA", "AMZN", "META", "GOOGL", "NFLX", "AMD", "COIN",
                "EURUSD=X", "GBPUSD=X", "USDJPY=X", "AUDUSD=X",
                "BTC-USD", "ETH-USD", "SOL-USD", "ADA-USD", "LINK-USD"
              ],
              "swing": [
                "SPY", "QQQ", "DIA", "IWM", "VTI", "GLD", "SLV", "ARKK", "VXUS", "XLE", "XLF", "XLK",
                "AAPL", "MSFT", "NVDA", "TSLA", "AMZN", "META", "GOOGL", "NFLX", "AMD", "COIN",
                "EURUSD=X", "GBPUSD=X", "USDJPY=X", "AUDUSD=X",
                "BTC-USD", "ETH-USD", "SOL-USD", "ADA-USD", "LINK-USD"
              ],
              "position": [
                "SPY", "QQQ", "DIA", "IWM", "VTI", "GLD", "SLV", "ARKK", "VXUS", "XLE", "XLF", "XLK",
                "AAPL", "MSFT", "NVDA", "TSLA", "AMZN", "META", "GOOGL", "NFLX", "AMD", "COIN",
                "BTC-USD", "ETH-USD", "SOL-USD", "ADA-USD", "LINK-USD"
              ]
            },
            "benchmarks": {
              "us": ["SPY", "QQQ"],
              "crypto": ["BTC-USD", "ETH-USD"],
              "forex": ["USDJPY=X", "EURUSD=X"]
            }
          }
          EOF

      - name: Ejecutar scanner
        run: python alert_system_final_etoro.py --once
