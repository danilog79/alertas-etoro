
name: Alertas eToro

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:

jobs:
  run-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements_alert_system.txt

      - name: Crear config.json
        run: |
          cat > config.json << 'EOF'
          {
            "scan_interval_seconds": 300,
            "cooldown_minutes": 60,
            "min_confidence": 70,
            "risk_reward_min": 2.0,
            "telegram": {
              "enabled": true,
              "bot_token": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
              "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}"
            },
            "heartbeat": {
              "enabled": true,
              "interval_minutes": 90
            },
            "watchlists": {
              "intraday": ["AAPL", "NVDA", "TSLA", "SPY", "QQQ", "AMZN", "EURUSD=X", "BTC-USD"],
              "swing": ["AAPL", "NVDA", "SPY", "QQQ", "AMZN", "GLD", "BTC-USD"],
              "position": ["AAPL", "MSFT", "SPY", "QQQ", "AMZN", "GLD", "BTC-USD"]
            },
            "intraday_filter": {
              "enabled": true,
              "min_atr_pct": 0.35,
              "max_distance_from_ema20_pct": 1.0,
              "max_distance_from_vwap_pct": 0.9,
              "max_bar_range_atr": 0.9,
              "us_session": {"start_utc": "13:35", "end_utc": "20:00"},
              "forex_session": {"start_utc": "06:00", "end_utc": "20:00"},
              "crypto_session": {"start_utc": "00:00", "end_utc": "23:59"}
            },
            "benchmark_filter": {
              "enabled": true,
              "equity": ["SPY", "QQQ"],
              "crypto": ["BTC-USD"],
              "forex": []
            },
            "logs": {
              "signals_path": "signals_log.csv",
              "watchlist_path": "watchlist_candidates.csv"
            }
          }
          EOF

      - name: Ejecutar scanner
        run: python alert_system_advanced.py --once
